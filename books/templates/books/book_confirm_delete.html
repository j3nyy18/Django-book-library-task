{% extends 'books/base.html' %}

{% block title %}Delete Book{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body">

                <h2 class="card-title text-danger mb-4">
                    <i class="bi bi-exclamation-triangle"></i> Confirm Delete
                </h2>
                
                <p class="lead">Are you sure you want to delete this book?</p>
                
                <div class="alert alert-warning">
                    <strong>Book:</strong> {{ object.title }}<br>
                    <strong>Author:</strong> {{ object.author }}
                </div>
                
                <p class="text-danger">
                    <i class="bi bi-info-circle"></i> This action cannot be undone.
                </p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Yes, Delete
                        </button>

                        <a href="{% url 'book_list' %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
